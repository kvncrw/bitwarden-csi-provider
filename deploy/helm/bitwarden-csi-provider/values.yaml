image:
  repository: ghcr.io/kvncrw/bitwarden-csi-provider
  tag: latest
  pullPolicy: IfNotPresent

providerDir: /etc/kubernetes/secrets-store-csi-providers
socketName: bitwarden.sock
healthPort: 8080
logFormat: json

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

serviceAccount:
  create: true
  name: bitwarden-csi-provider

nodeSelector: {}
tolerations: []
